name: Build AdaptixC2 Server

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'AdaptixClient/**'   # 忽略客户端相关改动
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'AdaptixClient/**'
  workflow_dispatch:

jobs:
  build-server-ext:
    name: Build Server & Extenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Go environment
        run: |
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Install dependencies (MinGW & build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make cmake gcc g++ mingw-w64 g++-mingw-w64 libssl-dev

      - name: Build server
        run: make server

      - name: Build extenders
        run: make extenders

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: dist/
          retention-days: 7
          if-no-files-found: warn
