name: Build AdaptixC2

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      clean_build:
        description: '是否清理缓存全新编译'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ============================================
  # 构建服务端与扩展器 (Go)
  # ============================================
  build-server-ext:
    name: Build Server & Extenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Go environment
        run: |
          # 设置 GOPROXY 加速 Go 模块下载
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Install dependencies (MinGW & build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            cmake \
            gcc \
            g++ \
            mingw-w64 \
            g++-mingw-w64 \
            libssl-dev

      - name: Build server
        run: |
          make server
        continue-on-error: false

      - name: Build extenders
        run: |
          make extenders
        continue-on-error: false

      - name: List build artifacts
        run: |
          ls -la dist/ || echo "dist directory not found"
          mkdir -p artifacts/server
          cp -r dist/* artifacts/server/ 2>/dev/null || true

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: artifacts/server/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 构建 Linux 客户端 (C++/Qt6)
  # ============================================
  build-client-linux:
    name: Build Client (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Install complete Qt6 dependencies
        run: |
          sudo apt-get update
          # 🔧 关键修复：添加 qt6-svg-dev 及其他必要模块
          sudo apt-get install -y \
            gcc \
            g++ \
            build-essential \
            make \
            cmake \
            libssl-dev \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-websockets-dev \
            qt6-declarative-dev \
            qt6-svg-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            libxkbcommon-dev \
            libgl-dev
  
      - name: Build AdaptixClient for Linux
        run: |
          make client
        continue-on-error: false
  
      - name: Package Linux client
        run: |
          mkdir -p artifacts/client-linux
          if [ -f dist/AdaptixClient ]; then
            cp dist/AdaptixClient artifacts/client-linux/
          elif [ -f dist/AdaptixClient.exe ]; then
            cp dist/AdaptixClient.exe artifacts/client-linux/
          fi
          echo "Linux client packaged"
  
      - name: Upload Linux client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-linux
          path: artifacts/client-linux/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 检测 Windows 客户端构建能力 (信息性任务)
  # ============================================
  check-client-windows:
    name: Check Windows Build Capability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 🔧 关键修复：此任务仅用于说明，始终成功完成
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show official Windows build guide
        run: |
          echo "::notice::Windows client cross-compilation is not supported in this CI environment."
          echo "::notice::Please refer to the official guide for building on Windows using MSYS2:"
          echo "::notice::https://github.com/Adaptix-Framework/AdaptixC2?tab=readme-ov-file#-client-build"
          echo ""
          echo "✅ This job is informational only and completes successfully."

  # ============================================
  # 整合所有构建产物
  # ============================================
  package-all:
    name: Package All Artifacts
    runs-on: ubuntu-latest
    needs: [build-server-ext, build-client-linux, check-client-windows]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create final archive
        run: |
          mkdir -p final-release
          cp -r all-artifacts/*/* final-release/ 2>/dev/null || true
          echo "Final artifacts organized in final-release/"

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptixc2-complete-build
          path: final-release/
          retention-days: 7
          if-no-files-found: warn
