name: Build AdaptixC2

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # ============================================
  # 构建服务端与扩展器 (Go)
  # ============================================
  build-server-ext:
    name: Build Server & Extenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Go environment
        run: |
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Install dependencies (MinGW & build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make cmake gcc g++ mingw-w64 g++-mingw-w64 libssl-dev

      - name: Build server
        run: make server

      - name: Build extenders
        run: make extenders

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: dist/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 构建 Windows 客户端 (MSYS2 + MinGW + Qt6)
  # ============================================
  build-client-windows:
    name: Build Client (Windows)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-openssl
          update: true

      - name: Configure with CMake (MSYS2)
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake ../AdaptixClient \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64

      - name: Build (MSYS2)
        shell: msys2 {0}
        run: |
          cd build
          mingw32-make -j$(nproc)

      - name: Locate executable
        shell: bash
        run: |
          find . -name "AdaptixClient.exe" -exec cp {} AdaptixClient.exe \;
          if [ -f AdaptixClient.exe ]; then
            echo "✅ Found AdaptixClient.exe"
          else
            echo "❌ Executable not found"
            exit 1
          fi

      - name: Upload Windows client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: AdaptixClient.exe
          retention-days: 7
          if-no-files-found: error
