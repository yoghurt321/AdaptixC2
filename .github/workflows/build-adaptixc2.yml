name: Build AdaptixC2

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # ============================================
  # 构建服务端与扩展器 (Go)
  # ============================================
  build-server-ext:
    name: Build Server & Extenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Go environment
        run: |
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Install dependencies (MinGW & build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make cmake gcc g++ mingw-w64 g++-mingw-w64 libssl-dev

      - name: Build server
        run: make server

      - name: Build extenders
        run: make extenders

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: dist/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 构建 Linux 客户端 (C++/Qt6)
  # ============================================
  build-client-linux:
    name: Build Client (Linux)
    runs-on: ubuntu-24.04   # Qt 6.6+ 支持 DevicePixelRatioChange
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ build-essential make cmake libssl-dev \
            qt6-base-dev qt6-base-private-dev \
            qt6-websockets-dev qt6-declarative-dev \
            qt6-svg-dev qt6-tools-dev qt6-tools-dev-tools \
            libxkbcommon-dev libgl-dev

      - name: Build AdaptixClient for Linux
        run: make client

      - name: Upload Linux client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-linux
          path: dist/AdaptixClient
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 构建 Windows 客户端 (原生编译)
  # ============================================
  build-client-windows:
    name: Build Client (Windows)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebsockets qtsvg qtdeclarative qttools'

      - name: Install OpenSSL
        run: |
          choco install openssl -y
          echo "C:\Program Files\OpenSSL-Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake ../AdaptixClient -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          cmake --build . --config Release --parallel

      - name: Locate executable
        run: |
          Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.Name -like "AdaptixClient*" } | ForEach-Object {
            Copy-Item $_.FullName -Destination "$env:GITHUB_WORKSPACE\AdaptixClient.exe"
          }

      - name: Upload Windows client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: AdaptixClient.exe
          retention-days: 7
          if-no-files-found: warn
