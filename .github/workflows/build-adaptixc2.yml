name: Build AdaptixC2

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # ============================================
  # 构建服务端与扩展器 (Go)
  # ============================================
  build-server-ext:
    name: Build Server & Extenders
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Go environment
        run: |
          go env -w GO111MODULE=on
          go env -w GOPROXY=https://goproxy.cn,direct

      - name: Install dependencies (MinGW & build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make cmake gcc g++ mingw-w64 g++-mingw-w64 libssl-dev

      - name: Build server
        run: make server

      - name: Build extenders
        run: make extenders

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-server-linux
          path: dist/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # 构建 Windows 客户端 (MSYS2 + MinGW + Qt6)
  # 并自动部署依赖，打包成可运行程序
  # ============================================
  build-client-windows:
    name: Build Client (Windows)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-openssl
          update: true

      - name: Configure with CMake (MSYS2)
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake ../AdaptixClient \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64

      - name: Build (MSYS2)
        shell: msys2 {0}
        run: |
          cd build
          mingw32-make -j$(nproc)

      - name: Deploy Qt dependencies (windeployqt)
        shell: msys2 {0}
        run: |
          # 找到生成的 AdaptixClient.exe
          if [ -f build/AdaptixClient.exe ]; then
            EXE_PATH="build/AdaptixClient.exe"
          elif [ -f build/Release/AdaptixClient.exe ]; then
            EXE_PATH="build/Release/AdaptixClient.exe"
          else
            echo "❌ Cannot find AdaptixClient.exe"
            exit 1
          fi

          # 创建部署目录
          mkdir -p deploy
          cp "$EXE_PATH" deploy/

          # 运行 windeployqt 自动复制所有依赖（包括 QML 文件）
          /mingw64/bin/windeployqt --release --qmldir /mingw64/qml deploy/AdaptixClient.exe

          echo "✅ Qt dependencies deployed to deploy/"

      - name: Package deployment as zip
        shell: pwsh
        run: |
          Compress-Archive -Path deploy/* -DestinationPath adaptix-client-windows.zip

      - name: Upload Windows client artifact (portable)
        uses: actions/upload-artifact@v4
        with:
          name: adaptix-client-windows
          path: adaptix-client-windows.zip
          retention-days: 7
